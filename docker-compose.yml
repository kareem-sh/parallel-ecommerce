services:
  app:
    restart: unless-stopped
    build:
      context: .
    environment:
      APP_NAME: E-Commerce-NFR
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:asrRVX0x4bYn244tj7WxGOS4GULHrjfzb1tXtt80mss=
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ecommerce_nfr
      DB_USERNAME: ecommerce
      DB_PASSWORD: secret
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_CHANNEL: stack
      LOG_STACK: single,stderr
      NFR_LOG_LEVEL: info
      TELESCOPE_ENABLED: "false"
    expose:
      - "9000"
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-network

  app2:
    restart: unless-stopped
    build:
      context: .
    environment:
      APP_NAME: E-Commerce-NFR
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:asrRVX0x4bYn244tj7WxGOS4GULHrjfzb1tXtt80mss=
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ecommerce_nfr
      DB_USERNAME: ecommerce
      DB_PASSWORD: secret
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_CHANNEL: stack
      LOG_STACK: single,stderr
      NFR_LOG_LEVEL: info
      TELESCOPE_ENABLED: "false"
    expose:
      - "9000"
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_started
    networks:
      - ecommerce-network

  worker:
    restart: unless-stopped
    build:
      context: .
    command: ["sh", "-c", "php artisan queue:work redis --queue=receipts,reports,default --sleep=1 --tries=3 --timeout=60"]
    environment:
      APP_NAME: E-Commerce-NFR
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:asrRVX0x4bYn244tj7WxGOS4GULHrjfzb1tXtt80mss=
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ecommerce_nfr
      DB_USERNAME: ecommerce
      DB_PASSWORD: secret
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_CHANNEL: stack
      LOG_STACK: single,stderr
      NFR_LOG_LEVEL: info
      TELESCOPE_ENABLED: "false"
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_started
    networks:
      - ecommerce-network

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/var/www/html/public:ro
    depends_on:
      app:
        condition: service_started
      app2:
        condition: service_started
    networks:
      - ecommerce-network

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ecommerce_nfr
      MYSQL_USER: ecommerce
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uecommerce -psecret --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - ecommerce-network

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ecommerce-network

  k6:
    image: grafana/k6:0.51.0
    profiles: ["test"]
    environment:
      BASE_URL: http://nginx:80
    volumes:
      - ./tests/k6:/scripts
      - ./storage/k6:/results
    depends_on:
      - nginx
    entrypoint: ["k6"]
    networks:
      - ecommerce-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  ecommerce-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
