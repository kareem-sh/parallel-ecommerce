services:
  app:
    restart: unless-stopped
    build:
      context: .
    environment:
      APP_NAME: E-Commerce-NFR
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:asrRVX0x4bYn244tj7WxGOS4GULHrjfzb1tXtt80mss=
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ecommerce_nfr
      DB_USERNAME: ecommerce
      DB_PASSWORD: secret
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_CHANNEL: stack
      LOG_STACK: single,stderr
      NFR_LOG_LEVEL: info
      TELESCOPE_ENABLED: "true"
    expose:
      - "8000"
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@file_get_contents('http://127.0.0.1:8000/up') === false ? 1 : 0);\""]
      interval: 10s
      timeout: 5s
      retries: 20

  app2:
    restart: unless-stopped
    build:
      context: .
    command: ["sh", "-c", "php artisan serve --host=0.0.0.0 --port=8000"]
    environment:
      APP_NAME: E-Commerce-NFR
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:asrRVX0x4bYn244tj7WxGOS4GULHrjfzb1tXtt80mss=
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ecommerce_nfr
      DB_USERNAME: ecommerce
      DB_PASSWORD: secret
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_CHANNEL: stack
      LOG_STACK: single,stderr
      NFR_LOG_LEVEL: info
      TELESCOPE_ENABLED: "true"
    expose:
      - "8000"
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy

  worker:
    restart: unless-stopped
    build:
      context: .
    command: ["sh", "-c", "php artisan queue:work redis --queue=receipts,reports,default --sleep=1 --tries=3 --timeout=60"]
    environment:
      APP_NAME: E-Commerce-NFR
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:asrRVX0x4bYn244tj7WxGOS4GULHrjfzb1tXtt80mss=
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ecommerce_nfr
      DB_USERNAME: ecommerce
      DB_PASSWORD: secret
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_CHANNEL: stack
      LOG_STACK: single,stderr
      NFR_LOG_LEVEL: info
      TELESCOPE_ENABLED: "true"
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
      app2:
        condition: service_started

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ecommerce_nfr
      MYSQL_USER: ecommerce
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uecommerce -psecret --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  k6:
    image: grafana/k6:0.51.0
    profiles: ["test"]
    environment:
      BASE_URL: http://nginx
    volumes:
      - ./tests/k6:/scripts
      - ./storage/k6:/results
    depends_on:
      - nginx
    entrypoint: ["k6"]

volumes:
  mysql-data:
  redis-data:
